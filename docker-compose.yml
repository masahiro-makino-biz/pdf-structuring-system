# =============================================================================
# docker-compose.yml - 全コンテナの定義ファイル
# =============================================================================
# 【このファイルの役割】
# 複数のDockerコンテナ（MongoDB, API, UI, MCP）をまとめて管理・起動するための設定
# 「docker-compose up」コマンド一発で全サービスが起動する
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # MongoDB - データベース
  # ---------------------------------------------------------------------------
  # 【役割】PDFから抽出したデータ、ジョブ情報などを保存するデータベース
  # 【なぜMongoDBか】
  #   - JSONのような柔軟な構造のデータを保存できる（スキーマレス）
  #   - PDFの構造化データは形式が様々なので、柔軟なDBが適している
  # 【他の選択肢】
  #   - PostgreSQL: 厳密なスキーマが必要な場合に適する。今回は柔軟性重視でMongoDB
  #   - MySQL: 同上
  mongo:
    image: mongo:7  # MongoDB バージョン7の公式イメージを使用
    container_name: pdf-mongo
    ports:
      - "27017:27017"  # ホストの27017番ポートとコンテナの27017番を接続
    volumes:
      - mongo_data:/data/db  # データを永続化（コンテナ削除してもデータは残る）
      - ./mongo/init.js:/docker-entrypoint-initdb.d/init.js:ro  # 初期化スクリプト
    restart: unless-stopped  # エラーで停止しても自動再起動

  # ---------------------------------------------------------------------------
  # FastAPI - APIサーバー
  # ---------------------------------------------------------------------------
  # 【役割】フロントエンド（Streamlit）とバックエンド処理をつなぐ中間層
  # 【なぜFastAPIか】
  #   - Pythonで書ける（学習コストが低い）
  #   - 自動でAPIドキュメントが生成される（/docs でアクセス可能）
  #   - 非同期処理に対応（重い処理でも他のリクエストをブロックしない）
  # 【他の選択肢】
  #   - Flask: よりシンプルだが、非同期処理や型ヒントのサポートが弱い
  #   - Django: フルスタックで大規模向け。今回は軽量なFastAPIが適切
  api:
    build: ./api  # ./api/Dockerfile を使ってビルド
    container_name: pdf-api
    ports:
      - "8000:8000"  # http://localhost:8000 でアクセス可能
    volumes:
      - ./api:/app:Z  # ローカルのapiフォルダをコンテナ内の/appにマウント（コード変更即反映）
      - ./data:/data:Z  # 共有データフォルダ
    environment:
      - MONGO_URL=mongodb://mongo:27017  # MongoDBへの接続先
      - MCP_URL=http://mcp:8001  # MCPサーバーへの接続先（チャット検索用）
      # ---------------------------------------------------------------------------
      # LiteLLM設定（全プロバイダー統一）
      # ---------------------------------------------------------------------------
      # 【なぜLiteLLM経由か】
      #   - OpenAI/Azure/Bedrock/Gemini を同じコードで呼び出せる
      #   - プロバイダー切り替えは litellm/config.yaml で行う
      - LITELLM_URL=http://litellm:4000  # LiteLLMプロキシURL
      - LITELLM_API_KEY=${LITELLM_API_KEY:-sk-litellm}  # LiteLLMプロキシのAPIキー
      - LITELLM_MODEL=${LITELLM_MODEL:-azure-gpt-4o}  # Azure OpenAIを使用
      # ---------------------------------------------------------------------------
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}  # PDF解析用（直接OpenAI呼び出し）
      - PYTHONIOENCODING=utf-8  # 日本語ファイル名対応
      - LANG=C.UTF-8
    depends_on:
      - mongo  # MongoDBが起動してからAPIを起動
      - mcp  # MCPサーバーが起動してからAPIを起動
      - litellm  # LiteLLMが起動してからAPIを起動
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Streamlit - ユーザーインターフェース
  # ---------------------------------------------------------------------------
  # 【役割】ユーザーが操作するWebの画面（Admin画面、チャット画面）
  # 【なぜStreamlitか】
  #   - Pythonだけで画面が作れる（HTML/CSS/JavaScriptの知識不要）
  #   - データ可視化に強い（グラフ、表が簡単に作れる）
  #   - 学習コストが低い
  # 【他の選択肢】
  #   - React/Vue: 本格的なUI。学習コスト高、開発時間もかかる
  #   - Gradio: 機械学習デモ向け。今回の用途にはStreamlitが適切
  ui:
    build: ./ui
    container_name: pdf-ui
    ports:
      - "8501:8501"  # http://localhost:8501 でアクセス可能
    volumes:
      - ./ui:/app:Z
      - ./data:/data:Z
    environment:
      - API_URL=http://api:8000  # APIサーバーへの接続先
    depends_on:
      - api
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # LiteLLM - LLMプロキシサーバー
  # ---------------------------------------------------------------------------
  # 【役割】様々なLLMプロバイダー（OpenAI/Azure/Bedrock/Gemini）をOpenAI互換APIで提供
  # 【なぜLiteLLMか】
  #   - Agent Framework が Bedrock 非対応でも、LiteLLM経由なら使える
  #   - プロバイダー切り替えがコード変更なしで可能
  #   - 全てのLLMを同じコードで呼び出せる
  # 【他の選択肢】
  #   - 直接各プロバイダーのSDKを使う: プロバイダーごとにコードが必要
  #   - Portkey: 商用サービス、より高機能だが有料
  litellm:
    build: ./api/litellm
    container_name: pdf-litellm
    ports:
      - "4000:4000"  # http://localhost:4000 でアクセス可能
    volumes:
      - ./api/litellm:/app:Z  # 設定ファイル変更を即反映
    environment:
      # LiteLLMマスターキー（APIサービスと同じキーを共有）
      - LITELLM_MASTER_KEY=${LITELLM_API_KEY:-sk-litellm}
      # OpenAI
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      # Azure OpenAI
      - AZURE_API_KEY=${AZURE_API_KEY:-}
      - AZURE_API_BASE=${AZURE_API_BASE:-}
      - AZURE_API_VERSION=${AZURE_API_VERSION:-2025-03-01-preview}
      # AWS Bedrock（APIキー認証）
      - AWS_BEARER_TOKEN_BEDROCK=${AWS_BEARER_TOKEN_BEDROCK:-}
      # Google Gemini（使用時はコメント解除）
      # - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # MongoDB MCP Server - MongoDB公式MCPサーバー
  # ---------------------------------------------------------------------------
  # 【役割】AIが直接MongoDBにクエリ（find/aggregate等）を実行できるツール
  # 【なぜ追加するか】
  #   - 自作MCPの search_documents は固定的な検索しかできない
  #   - aggregate（集計・統計）による柔軟な分析が可能になる
  #   - 自作MCPと併用し、精度を検証する
  # 【セキュリティ】
  #   - MDB_MCP_READ_ONLY=true でデータ変更を完全ブロック
  #   - pages_default ビューでテナント分離（mongo/init.js で作成）
  mongodb-mcp:
    image: mongodb/mongodb-mcp-server:latest
    container_name: pdf-mongodb-mcp
    environment:
      - MDB_MCP_CONNECTION_STRING=mongodb://mongo:27017/pdf_system
      - MDB_MCP_READ_ONLY=true
    command: ["--transport", "http", "--httpHost", "0.0.0.0", "--httpPort", "3100"]
    ports:
      - "3100:3100"
    depends_on:
      - mongo
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # FastMCP - MCPツールサーバー
  # ---------------------------------------------------------------------------
  # 【役割】PDF処理、画像加工、AI呼び出しなどの「ツール」を提供
  # 【なぜMCPか】
  #   - ツールを標準化された形式で提供できる
  #   - Claude等のAIから呼び出しやすい
  # 【注意】フェーズ1ではスケルトン（空の枠組み）のみ
  mcp:
    build: ./mcp
    container_name: pdf-mcp
    ports:
      - "8001:8001"
    volumes:
      - ./mcp:/app:Z
      - ./data:/data:Z
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}  # 環境変数から取得（.envファイルに設定）
      - MONGO_URL=mongodb://mongo:27017  # MongoDBへの接続先（構造化データ保存用）
      - PYTHONIOENCODING=utf-8  # 日本語ファイル名対応
      - LANG=C.UTF-8
    depends_on:
      - mongo
    restart: unless-stopped

# -----------------------------------------------------------------------------
# ボリューム定義
# -----------------------------------------------------------------------------
# 【ボリュームとは】
# Dockerコンテナが削除されてもデータを残すための仕組み
# 下記はMongoDBのデータを永続化している
volumes:
  mongo_data:
