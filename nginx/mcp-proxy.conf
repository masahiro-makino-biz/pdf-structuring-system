# =============================================================================
# nginx/mcp-proxy.conf - MCPサーバー外部公開用のnginx設定
# =============================================================================
#
# 【使い方】
# VM上のnginx設定に追加（例: /etc/nginx/conf.d/mcp-proxy.conf）
# sudo cp nginx/mcp-proxy.conf /etc/nginx/conf.d/
# sudo nginx -t && sudo systemctl reload nginx
#
# 【公開されるエンドポイント】
# /mcp-graph/  → グラフMCPサーバー（localhost:8011）
# /mcp-mongo/  → MongoDB MCPサーバー（localhost:3101）
#
# =============================================================================

# グラフMCPサーバー（visualize_data, forecast_linear等）
location /mcp-graph/ {
    # Basic認証
    auth_basic "MCP Graph Server";
    auth_basic_user_file /etc/nginx/.htpasswd_mcp;

    proxy_pass http://localhost:8011/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # SSE対応（MCPのStreamable HTTP用）
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 120s;
}

# MongoDB MCPサーバー（find, aggregate等）
location /mcp-mongo/ {
    # Basic認証
    auth_basic "MCP MongoDB Server";
    auth_basic_user_file /etc/nginx/.htpasswd_mcp;

    proxy_pass http://localhost:3101/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # SSE対応（MCPのStreamable HTTP用）
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 120s;
}
